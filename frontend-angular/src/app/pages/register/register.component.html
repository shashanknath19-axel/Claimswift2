<section class="register-layout fade-up">
  <div class="register-card surface-card">
    <div class="header">
      <p class="eyebrow">Policyholder Enrollment</p>
      <h1>Create your ClaimSwift account</h1>
      <p>
        Public signup creates a policyholder profile only. Adjuster, manager, and admin access is provisioned through
        internal authorization controls.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row two-col">
        <label>
          First name
          <input type="text" formControlName="firstName" placeholder="John" />
          <small class="field-error" *ngIf="fieldError('firstName', 'First name') as message">{{ message }}</small>
        </label>
        <label>
          Last name
          <input type="text" formControlName="lastName" placeholder="Doe" />
          <small class="field-error" *ngIf="fieldError('lastName', 'Last name') as message">{{ message }}</small>
        </label>
      </div>

      <div class="row two-col">
        <label>
          Username
          <input type="text" formControlName="username" placeholder="john123" />
          <small class="field-error" *ngIf="fieldError('username', 'Username') as message">{{ message }}</small>
        </label>
        <label>
          Phone (optional)
          <input type="text" formControlName="phoneNumber" placeholder="+15551234567" />
        </label>
      </div>

      <div class="row two-col">
        <label>
          Email
          <input type="email" formControlName="email" placeholder="john@example.com" />
          <small class="field-error" *ngIf="fieldError('email', 'Email') as message">{{ message }}</small>
        </label>
        <label>
          Password
          <input type="password" formControlName="password" placeholder="Minimum 8 characters" />
          <small class="field-error" *ngIf="fieldError('password', 'Password') as message">{{ message }}</small>
        </label>
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="redirect">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</section>
